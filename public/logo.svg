<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="512" y2="512" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#0066FF"/>
      <stop offset="100%" stop-color="#003FBF"/>
    </linearGradient>
  </defs>

  <!-- Rounded background -->
  <rect width="512" height="512" rx="120" fill="url(#bg)"/>
  
  <!-- Subtle top highlight -->
  <rect width="512" height="240" rx="120" fill="white" fill-opacity="0.08"/>

  <!-- Stylized "E" lettermark built from geometric bars -->
  <!-- Top horizontal bar -->
  <rect x="128" y="128" width="256" height="44" rx="10" fill="white"/>
  <!-- Middle horizontal bar -->
  <rect x="128" y="234" width="200" height="44" rx="10" fill="white"/>
  <!-- Bottom horizontal bar -->
  <rect x="128" y="340" width="256" height="44" rx="10" fill="white"/>
  <!-- Left vertical bar -->
  <rect x="128" y="128" width="44" height="256" rx="10" fill="white"/>
  
  <!-- Cursor dot accent -->
  <circle cx="404" cy="362" r="16" fill="#60a5fa"/>
</svg>
